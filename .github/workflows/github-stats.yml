name: Update GitHub Stats

on:
  schedule:
    - cron: "0 0 * * *"  # 每天 UTC 时间 0 点（北京时间早 8 点）自动运行一次
  workflow_dispatch:     # 允许手动触发运行

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      
      - name: Generate GitHub Stats Card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=HappyNewYear1995&show_icons=true&theme=radical
          path: assets/github-stats.svg
      
      - name: Generate Top Languages Card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=HappyNewYear1995&layout=compact&theme=radical
          path: assets/top-langs.svg
      
      - name: Commit and Push Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/*.svg
          git commit -m "Update GitHub stats cards" || exit 0
          git push
